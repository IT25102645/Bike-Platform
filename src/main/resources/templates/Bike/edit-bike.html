<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Edit Bike</title>
    <style>
        .form-card { background: white; border: 1px solid #ddd; border-radius: 4px; padding: 24px; max-width: 620px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 3px;
            font-size: 13px; color: #333; background: #fafafa;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #0057b8; background: white;
        }
        .form-group input[readonly] { background: #f0f0f0; color: #888; cursor: not-allowed; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .extra-fields { border: 1px solid #e0e8f0; border-radius: 4px; padding: 16px; margin-top: 8px; background: #f7faff; }
        .extra-fields h4 { font-size: 13px; color: #0057b8; margin-bottom: 12px; }
        .alert { padding: 10px 14px; border-radius: 3px; font-size: 13px; margin-bottom: 16px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .btn-secondary { background: #6c757d; color: white; border: none; padding: 8px 20px; border-radius: 3px; font-size: 13px; cursor: pointer; text-decoration: none; }
        .btn-secondary:hover { background: #5a6268; color: white; }
        .bike-id-badge { display: inline-block; background: #f0f0f0; border: 1px solid #ddd; border-radius: 3px; padding: 4px 10px; font-size: 12px; color: #666; margin-bottom: 16px; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="page-content">
        <div class="page-title">Edit Bike</div>

        <!-- Messages -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

        <div th:if="${bike != null}" class="form-card">

            <div class="bike-id-badge" th:text="'Bike ID: ' + ${bike.bikeId}">Bike ID: BIKE-001</div>

            <form th:action="@{/bikes/edit/{id}(id=${bike.bikeId})}" method="post">

                <!-- Bike Type (read only) -->
                <div class="form-group">
                    <label>Bike Type</label>
                    <input type="text" th:value="${bike.bikeType}" readonly />
                </div>

                <!-- Model & Brand -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="model">Model</label>
                        <input type="text" id="model" name="model" th:value="${bike.model}" required />
                    </div>
                    <div class="form-group">
                        <label for="brand">Brand</label>
                        <input type="text" id="brand" name="brand" th:value="${bike.brand}" required />
                    </div>
                </div>

                <!-- Price & Availability -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="pricePerHour">Price Per Hour (LKR)</label>
                        <input type="number" id="pricePerHour" name="pricePerHour" step="0.01" min="0" th:value="${bike.pricePerHour}" required />
                    </div>
                    <div class="form-group">
                        <label for="available">Availability</label>
                        <select id="available" name="available">
                            <option value="true"  th:selected="${bike.available}">Available</option>
                            <option value="false" th:selected="${!bike.available}">Unavailable</option>
                        </select>
                    </div>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3" th:text="${bike.description}"></textarea>
                </div>

                <!-- Electric Bike Extra Fields -->
                <div th:if="${bike.bikeType == 'ELECTRIC'}" class="extra-fields">
                    <h4>⚡ Electric Bike Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="batteryRangeKm">Battery Range (km)</label>
                            <input type="number" id="batteryRangeKm" name="batteryRangeKm" min="0"
                                   th:value="${bike.batteryRangeKm}" />
                        </div>
                        <div class="form-group">
                            <label for="chargingFeePerHour">Charging Fee Per Hour (LKR)</label>
                            <input type="number" id="chargingFeePerHour" name="chargingFeePerHour" step="0.01" min="0"
                                   th:value="${bike.chargingFeePerHour}" />
                        </div>
                    </div>
                </div>

                <!-- Manual Bike Extra Fields -->
                <div th:if="${bike.bikeType == 'MANUAL'}" class="extra-fields">
                    <h4>🚲 Manual Bike Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="gearCount">Gear Count</label>
                            <input type="number" id="gearCount" name="gearCount" min="1"
                                   th:value="${bike.gearCount}" />
                        </div>
                        <div class="form-group">
                            <label for="longRentalDiscountRate">Long Rental Discount Rate</label>
                            <input type="number" id="longRentalDiscountRate" name="longRentalDiscountRate" step="0.01" min="0" max="1"
                                   th:value="${bike.longRentalDiscountRate}" />
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-3 mt-3">
                    <button type="submit" class="btn-main">Save Changes</button>
                    <a th:href="@{/bikes}" class="btn-secondary">Cancel</a>
                </div>

            </form>
        </div>

    </div>
</div>
</body>
</html>
