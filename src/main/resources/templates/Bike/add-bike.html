<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Add Bike</title>
    <style>
        .form-card { background: white; border: 1px solid #ddd; border-radius: 4px; padding: 24px; max-width: 620px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 3px;
            font-size: 13px; color: #333; background: #fafafa;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #0057b8; background: white;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .extra-fields { border: 1px solid #e0e8f0; border-radius: 4px; padding: 16px; margin-top: 8px; background: #f7faff; }
        .extra-fields h4 { font-size: 13px; color: #0057b8; margin-bottom: 12px; }
        .alert { padding: 10px 14px; border-radius: 3px; font-size: 13px; margin-bottom: 16px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger  { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .btn-secondary { background: #6c757d; color: white; border: none; padding: 8px 20px; border-radius: 3px; font-size: 13px; cursor: pointer; text-decoration: none; }
        .btn-secondary:hover { background: #5a6268; color: white; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="page-content">
        <div class="page-title">Add New Bike</div>

        <!-- Success / Error Messages -->
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

        <div class="form-card">
            <form th:action="@{/bikes/add}" method="post">

                <!-- Bike Type -->
                <div class="form-group">
                    <label for="bikeType">Bike Type</label>
                    <select id="bikeType" name="bikeType" onchange="toggleExtraFields(this.value)" required>
                        <option value="">-- Select Type --</option>
                        <option value="ELECTRIC">Electric Bike</option>
                        <option value="MANUAL">Manual Bike</option>
                    </select>
                </div>

                <!-- Model & Brand -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="model">Model</label>
                        <input type="text" id="model" name="model" placeholder="e.g. Trek X1" required />
                    </div>
                    <div class="form-group">
                        <label for="brand">Brand</label>
                        <input type="text" id="brand" name="brand" placeholder="e.g. Trek" required />
                    </div>
                </div>

                <!-- Price & Owner -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="pricePerHour">Price Per Hour (LKR)</label>
                        <input type="number" id="pricePerHour" name="pricePerHour" step="0.01" min="0" placeholder="e.g. 250" required />
                    </div>
                    <div class="form-group">
                        <label for="ownerUsername">Owner Username</label>
                        <input type="text" id="ownerUsername" name="ownerUsername" placeholder="e.g. john123" required />
                    </div>
                </div>

                <!-- Description -->
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3" placeholder="Brief description of the bike..."></textarea>
                </div>

                <!-- Electric Bike Extra Fields -->
                <div id="electricFields" class="extra-fields" style="display:none;">
                    <h4>⚡ Electric Bike Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="batteryRangeKm">Battery Range (km)</label>
                            <input type="number" id="batteryRangeKm" name="batteryRangeKm" min="0" placeholder="e.g. 80" />
                        </div>
                        <div class="form-group">
                            <label for="chargingFeePerHour">Charging Fee Per Hour (LKR)</label>
                            <input type="number" id="chargingFeePerHour" name="chargingFeePerHour" step="0.01" min="0" placeholder="e.g. 50" />
                        </div>
                    </div>
                </div>

                <!-- Manual Bike Extra Fields -->
                <div id="manualFields" class="extra-fields" style="display:none;">
                    <h4>🚲 Manual Bike Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="gearCount">Gear Count</label>
                            <input type="number" id="gearCount" name="gearCount" min="1" placeholder="e.g. 21" />
                        </div>
                        <div class="form-group">
                            <label for="longRentalDiscountRate">Long Rental Discount Rate (0.0 - 1.0)</label>
                            <input type="number" id="longRentalDiscountRate" name="longRentalDiscountRate" step="0.01" min="0" max="1" placeholder="e.g. 0.20" />
                        </div>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-3 mt-3">
                    <button type="submit" class="btn-main">Add Bike</button>
                    <a th:href="@{/bikes}" class="btn-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    function toggleExtraFields(type) {
        document.getElementById('electricFields').style.display = (type === 'ELECTRIC') ? 'block' : 'none';
        document.getElementById('manualFields').style.display   = (type === 'MANUAL')   ? 'block' : 'none';
    }
</script>
</body>
</html>
