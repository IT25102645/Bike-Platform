<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Add Bike</title>
    <style>
        .section{padding:24px;}
        .form-card{max-width:600px;background:white;border:1px solid #ddd;border-radius:4px;padding:24px;}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;font-size:12px;font-weight:bold;color:#666;margin-bottom:6px;text-transform:uppercase;}
        .form-control{width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:3px;font-size:13px;color:#333;background:#fafafa;}
        .form-control:focus{outline:none;border-color:#0057b8;background:white;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        .extra-fields{border:1px solid #e0e8f0;border-radius:4px;padding:16px;margin-top:8px;background:#f7faff;}
        .extra-fields h4{font-size:13px;color:#0057b8;margin-bottom:12px;}
        .alert{padding:10px 14px;border-radius:3px;font-size:13px;margin-bottom:16px;}
        .alert-success{background:#d4edda;color:#155724;border:1px solid #c3e6cb;}
        .alert-danger{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;}
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="section">
        <div style="font-size:16px;font-family:Georgia,serif;color:#2c2c2c;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #ddd;">
            List a New Bike
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

        <div class="form-card">
            <form th:action="@{/bikes/add}" method="POST">

                <div class="form-group">
                    <label>Bike Type</label>
                    <select name="bikeType" class="form-control" id="typeSelect" onchange="toggleTypeFields()">
                        <option value="MANUAL">Manual Bike</option>
                        <option value="ELECTRIC">Electric Bike</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" name="brand" class="form-control" placeholder="e.g. Giant" required>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <input type="text" name="model" class="form-control" placeholder="e.g. Trance Pro" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Price Per Hour (LKR)</label>
                        <input type="number" name="pricePerHour" class="form-control" placeholder="500" required>
                    </div>
                    <div class="form-group">
                        <label>Owner Username</label>
                        <input type="text" name="ownerUsername" class="form-control" placeholder="e.g. nimal" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Brief description..."></textarea>
                </div>

                <!-- Manual Bike Fields -->
                <div id="manualFields" class="extra-fields">
                    <h4>🚲 Manual Bike Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Gear Count</label>
                            <input type="number" name="gearCount" class="form-control" value="21">
                        </div>
                        <div class="form-group">
                            <label>Long Rental Discount Rate (0.0 - 1.0)</label>
                            <input type="number" name="longRentalDiscountRate" class="form-control" step="0.01" min="0" max="1" value="0.20">
                        </div>
                    </div>
                </div>

                <!-- Electric Bike Fields -->
                <div id="electricFields" class="extra-fields" style="display:none;">
                    <h4>⚡ Electric Bike Details</h4>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Battery Range (KM)</label>
                            <input type="number" name="batteryRangeKm" class="form-control" value="60">
                        </div>
                        <div class="form-group">
                            <label>Charging Fee Per Hour (LKR)</label>
                            <input type="number" name="chargingFeePerHour" class="form-control" step="0.01" value="50">
                        </div>
                    </div>
                </div>

                <div style="margin-top:16px;display:flex;gap:12px;">
                    <button type="submit" class="btn-main">List Bike</button>
                    <a th:href="@{/bikes}" class="btn-main" style="background:#6c757d;">Cancel</a>
                </div>

            </form>
        </div>
    </div>

    <script>
        function toggleTypeFields() {
            const type = document.getElementById('typeSelect').value;
            document.getElementById('manualFields').style.display   = (type === 'MANUAL')   ? 'block' : 'none';
            document.getElementById('electricFields').style.display = (type === 'ELECTRIC') ? 'block' : 'none';
        }
    </script>
</div>
</body>
</html>
