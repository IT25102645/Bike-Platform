<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Bike - Bike Platform</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-container {
            max-width: 700px;
            margin: 4rem auto;
        }

        .card-header {
            background-color: var(--dark-bg);
            color: white;
            padding: 1.5rem 2rem;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 2rem 0 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }

        .type-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .type-option {
            border: 2px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .type-option i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .type-option.active {
            border-color: var(--primary-color);
            background-color: #f0f7ff;
        }

        .type-option.active i {
            color: var(--primary-color);
        }

        .dynamic-fields {
            display: none;
            background-color: #fcfcfc;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="/">Bike Rental Platform</a>
    <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/bikes">All Bikes</a>
    </div>
</nav>

<div class="container form-container">
    <div class="card" style="padding: 0; border: none;">
        <div class="card-header">
            <i class="fas fa-bicycle"></i>
            <h1>List Your Bike</h1>
        </div>

        <form th:action="@{/bikes/add}" method="POST" style="padding: 2rem;">
            <div class="section-label">Select Bike Type</div>
            <div class="type-selector">
                <div id="btnManual" class="type-option active" onclick="selectType('MANUAL')">
                    <i class="fas fa-person-biking"></i>
                    <div style="font-weight: 700;">MANUAL</div>
                </div>
                <div id="btnElectric" class="type-option" onclick="selectType('ELECTRIC')">
                    <i class="fas fa-bolt"></i>
                    <div style="font-weight: 700;">ELECTRIC</div>
                </div>
            </div>
            <input type="hidden" name="type" id="bikeType" value="MANUAL">

            <div class="section-label">General Information</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label for="brand">BRAND</label>
                    <input type="text" id="brand" name="brand" class="form-control" placeholder="e.g. Giant, Trek" required>
                </div>
                <div class="form-group">
                    <label for="model">MODEL</label>
                    <input type="text" id="model" name="model" class="form-control" placeholder="e.g. Trance Pro" required>
                </div>
            </div>

            <div class="form-group">
                <label for="description">DESCRIPTION</label>
                <textarea id="description" name="description" class="form-control" rows="3" placeholder="Describe the bike's condition and features..."></textarea>
            </div>

            <div class="form-group">
                <label for="pricePerHour">PRICE PER HOUR (Rs.)</label>
                <input type="number" id="pricePerHour" name="pricePerHour" class="form-control" placeholder="500" required>
            </div>

            <!-- Manual Specific -->
            <div id="manualFields" class="dynamic-fields" style="display: block;">
                <div class="form-group">
                    <label for="gearCount">GEAR COUNT</label>
                    <input type="number" id="gearCount" name="gearCount" class="form-control" value="21">
                </div>
                <div class="form-group">
                    <label for="longRentalDiscountRate">LONG RENTAL DISCOUNT (0.1 = 10%)</label>
                    <input type="number" step="0.01" id="longRentalDiscountRate" name="longRentalDiscountRate" class="form-control" value="0.10">
                </div>
            </div>

            <!-- Electric Specific -->
            <div id="electricFields" class="dynamic-fields">
                <div class="form-group">
                    <label for="batteryRangeKm">BATTERY RANGE (KM)</label>
                    <input type="number" id="batteryRangeKm" name="batteryRangeKm" class="form-control" placeholder="60">
                </div>
                <div class="form-group">
                    <label for="chargingFeePerHour">CHARGING FEE PER HOUR (Rs.)</label>
                    <input type="number" id="chargingFeePerHour" name="chargingFeePerHour" class="form-control" placeholder="50">
                </div>
            </div>

            <div class="form-group">
                <label for="ownerUsername">OWNER USERNAME</label>
                <input type="text" id="ownerUsername" name="ownerUsername" class="form-control" placeholder="Your username" required>
            </div>

            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">List Bike for Rent</button>
            </div>
        </form>
    </div>
</div>

<footer>
    <p>&copy; 2026 Bike Rental Platform. All rights reserved.</p>
</footer>

<script>
    function selectType(type) {
        document.getElementById('bikeType').value = type;
        
        document.getElementById('btnManual').classList.toggle('active', type === 'MANUAL');
        document.getElementById('btnElectric').classList.toggle('active', type === 'ELECTRIC');
        
        document.getElementById('manualFields').style.display = (type === 'MANUAL') ? 'block' : 'none';
        document.getElementById('electricFields').style.display = (type === 'ELECTRIC') ? 'block' : 'none';
    }
</script>

</body>
</html>
