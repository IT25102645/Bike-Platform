<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Invoice</title>
    <style>
        .invoice-section {
            padding: 40px 24px;
            min-height: calc(100vh - 60px);
            width: 100%;
            box-sizing: border-box;
            background: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .section-title {
            font-size: 22px;
            font-family: Georgia, serif;
            color: #2c2c2c;
            margin-bottom: 24px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0057b8;
            width: 100%;
            max-width: 560px;
        }
        .invoice-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 36px;
            width: 100%;
            max-width: 560px;
            box-sizing: border-box;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .invoice-header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .invoice-header h3 {
            font-size: 22px;
            color: #0057b8;
            font-family: Georgia, serif;
            margin-bottom: 4px;
        }
        .invoice-header p {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        .invoice-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }
        .invoice-row .label { color: #777; }
        .invoice-row .value { font-weight: bold; color: #2c2c2c; }
        .invoice-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            margin-top: 8px;
            border-top: 2px solid #0057b8;
            font-size: 17px;
        }
        .invoice-total .label { color: #2c2c2c; font-weight: bold; }
        .invoice-total .value { color: #0057b8; font-weight: bold; }
        .badge-success {
            background: #d4edda;
            color: #155724;
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: bold;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .action-buttons a {
            flex: 1;
            text-align: center;
            padding: 11px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="invoice-section">
        <div class="section-title">Payment Invoice</div>

        <div class="invoice-card">
            <div class="invoice-header">
                <h3>Bike Rental Platform</h3>
                <p>Payment Receipt</p>
                <span class="badge-success">✓ Payment Successful</span>
            </div>

            <div class="invoice-row">
                <span class="label">Payment ID</span>
                <span class="value" th:text="${paymentId}">PAY-1</span>
            </div>
            <div class="invoice-row">
                <span class="label">User ID</span>
                <span class="value" th:text="${userId}">USR-1</span>
            </div>
            <div class="invoice-row">
                <span class="label">Payment Type</span>
                <span class="value" th:text="${type}">RENTAL</span>
            </div>
            <div class="invoice-row" th:if="${rentalId}">
                <span class="label">Rental ID</span>
                <span class="value" th:text="${rentalId}">RENT-1</span>
            </div>
            <div class="invoice-row" th:if="${rideId}">
                <span class="label">Ride ID</span>
                <span class="value" th:text="${rideId}">RIDE-1</span>
            </div>
            <div class="invoice-row">
                <span class="label">Date</span>
                <span class="value" th:text="${date}">2026-05-16</span>
            </div>
            <div class="invoice-row">
                <span class="label">Status</span>
                <span class="badge-success" th:text="${status}">COMPLETED</span>
            </div>

            <div class="invoice-total">
                <span class="label">Total Amount</span>
                <span class="value">LKR <span th:text="${amount}">0.00</span></span>
            </div>

            <div class="action-buttons">
                <a th:href="@{/payment/history}" class="btn-main">View History</a>
                <a th:href="@{/payment}" class="btn-main" style="background:#555;">New Payment</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
