<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Bike Platform</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }

        .navbar { background: #1a1a2e !important; padding: 0 2rem; height: 60px; }
        .navbar-brand { color: white !important; font-size: 20px; font-weight: 500; }
        .nav-link { color: rgba(255,255,255,0.75) !important; border-radius: 6px; padding: 6px 14px !important; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.12); color: white !important; }

        .hero { background: linear-gradient(135deg, #1a1a2e, #0f3460);
            padding: 60px 2rem; text-align: center; color: white; }
        .hero h1 { font-size: 36px; font-weight: 500; margin-bottom: 12px; }
        .hero p { color: rgba(255,255,255,0.7); margin-bottom: 28px; }

        .btn-danger { background: #e94560 !important; border: none !important; }
        .card { border: 0.5px solid #e0e0e0 !important; border-radius: 12px !important; }
        .card:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.08); transform: translateY(-2px); transition: all 0.2s; }

        .footer { background: #1a1a2e; color: rgba(255,255,255,0.6);
            text-align: center; padding: 1.5rem; font-size: 13px; margin-top: 3rem; }
        .footer span { color: #e94560; }

        .page-content { padding: 2rem; }
        .page-title { font-size: 24px; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a2e; }
        .btn-main { background: #1a1a2e; color: white; border: none; padding: 8px 20px; border-radius: 8px; }
        .btn-main:hover { background: #e94560; color: white; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/static">🚲 Bike Platform</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-1">
            <a class="nav-link" th:href="@{/bikes}">Bikes</a>
            <a class="nav-link" th:href="@{/rentals}">Rentals</a>
            <a class="nav-link" th:href="@{/rides}">Rides</a>
            <a class="nav-link" th:href="@{/payments}">Payments</a>
            <a class="nav-link" th:href="@{/reviews}">Reviews</a>
            <a class="nav-link" th:href="@{/users}">Users</a>
        </div>
    </div>
</nav>

<!-- Page Content -->
<div layout:fragment="content"></div>

<!-- Footer -->
<div class="footer">
    © 2026 <span>Bike Platform</span> · SE1020 OOP Project · SLIIT
</div>

</body>
</html>
