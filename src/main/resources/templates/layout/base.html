<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Bike Platform</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f4f4f4; font-family: Arial, sans-serif; color: #333; }

        .navbar { background: #2c2c2c; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { color: white; font-size: 15px; font-weight: bold; text-decoration: none; }
        .nav-link { color: #bbb; font-size: 13px; text-decoration: none; padding: 0; }
        .nav-link:hover { color: white; }

        .page-content { padding: 2rem; max-width: 1100px; margin: auto; }
        .page-title { font-size: 16px; font-family: Georgia, serif; color: #2c2c2c; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #ddd; }

        .btn-main { background: #0057b8; color: white; border: none; padding: 8px 20px; border-radius: 3px; font-size: 13px; cursor: pointer; text-decoration: none; }
        .btn-main:hover { background: #004494; color: white; }

        .footer { background: #2c2c2c; color: #aaa; text-align: center; padding: 16px; font-size: 12px; margin-top: 40px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <a class="navbar-brand" href="/">Bike Rental Platform</a>
    <div class="d-flex gap-4">
        <a class="nav-link" th:href="@{/bikes}">Bikes</a>
        <a class="nav-link" th:href="@{/rentals}">Rentals</a>
        <a class="nav-link" th:href="@{/rides}">Rides</a>
        <a class="nav-link" th:href="@{/payments}">Payments</a>
        <a class="nav-link" th:href="@{/reviews}">Reviews</a>
        <a class="nav-link" th:href="@{/users}">Users</a>
    </div>
</nav>

<!-- Page Content — other pages inject their content here -->
<div layout:fragment="content"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
