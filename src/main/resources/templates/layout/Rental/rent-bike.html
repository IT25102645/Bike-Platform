<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Rent a Bike</title>
</head>
<body>
<div layout:fragment="content">
    <div style="padding: 2rem;">

        <!-- Page Title -->
        <h2 style="font-size: 24px; font-weight: 500; color: #1a1a2e; margin-bottom: 1.5rem;">
            🚲 Rent a Bike
        </h2>

        <!-- Form Card -->
        <div style="background: white; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 2rem; max-width: 600px;">
            <form action="/rentals/rent" method="post">

                <div class="mb-3">
                    <label style="font-size: 14px; color: #555; margin-bottom: 4px; display: block;">User ID</label>
                    <input type="text" name="userId" class="form-control" required
                           style="border-radius: 8px; border: 0.5px solid #ccc; padding: 10px;">
                </div>

                <div class="mb-3">
                    <label style="font-size: 14px; color: #555; margin-bottom: 4px; display: block;">Bike ID</label>
                    <input type="text" name="bikeId" class="form-control" required
                           style="border-radius: 8px; border: 0.5px solid #ccc; padding: 10px;">
                </div>

                <div class="row">
                    <div class="col mb-3">
                        <label style="font-size: 14px; color: #555; margin-bottom: 4px; display: block;">Start Date</label>
                        <input type="date" name="startDate" class="form-control" required
                               style="border-radius: 8px; border: 0.5px solid #ccc; padding: 10px;">
                    </div>
                    <div class="col mb-3">
                        <label style="font-size: 14px; color: #555; margin-bottom: 4px; display: block;">End Date</label>
                        <input type="date" name="endDate" class="form-control" required
                               style="border-radius: 8px; border: 0.5px solid #ccc; padding: 10px;">
                    </div>
                </div>

                <div class="row">
                    <div class="col mb-3">
                        <label style="font-size: 14px; color: #555; margin-bottom: 4px; display: block;">Number of Hours</label>
                        <input type="number" name="hours" class="form-control" required
                               style="border-radius: 8px; border: 0.5px solid #ccc; padding: 10px;">
                    </div>
                    <div class="col mb-3">
                        <label style="font-size: 14px; color: #555; margin-bottom: 4px; display: block;">Rate Per Hour (LKR)</label>
                        <input type="number" step="0.01" name="ratePerHour" class="form-control" required
                               style="border-radius: 8px; border: 0.5px solid #ccc; padding: 10px;">
                    </div>
                </div>

                <div style="display: flex; gap: 12px; margin-top: 1rem;">
                    <button type="submit"
                            style="background: #1a1a2e; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer;">
                        Rent Now
                    </button>
                    <a href="/rentals"
                       style="background: transparent; color: #1a1a2e; border: 1px solid #1a1a2e; padding: 10px 24px; border-radius: 8px; font-size: 14px; text-decoration: none;">
                        Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>
</body>
</html>
