<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Rent a Bike</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>Rent a Bike</h2>
    <form action="/rentals/rent" method="post">
        <div class="mb-3">
            <label>User ID</label>
            <input type="text" name="userId" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Bike ID</label>
            <input type="text" name="bikeId" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Start Date</label>
            <input type="date" name="startDate" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>End Date</label>
            <input type="date" name="endDate" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Number of Hours</label>
            <input type="number" name="hours" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Rate Per Hour (LKR)</label>
            <input type="number" step="0.01" name="ratePerHour" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-success">Rent Now</button>
        <a href="/rentals" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
