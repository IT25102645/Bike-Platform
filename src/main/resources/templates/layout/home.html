<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Bike Platform</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f23; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; }
        h1 { color: #e94560; font-size: 3rem; margin-bottom: 1rem; }
        p { color: rgba(255,255,255,0.7); font-size: 1.2rem; margin-bottom: 2rem; }
        .links { display: flex; gap: 20px; }
        .btn { padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:hover { background: #c73652; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4); }
        .btn-outline { border: 1px solid rgba(255,255,255,0.2); color: #fff; }
        .btn-outline:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    </style>
</head>
<body>
    <h1>Welcome to Bike Platform</h1>
    <p>The most reliable bike rental system.</p>
    <div class="links">
        <a href="/users/login" class="btn btn-primary">Login</a>
        <a href="/users/register" class="btn btn-outline">Register</a>
    </div>
</body>
</html>
