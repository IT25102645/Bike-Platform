<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Join a Ride</title>
    <style>
        .section-title{font-size:14px;font-family:Georgia,serif;color:#2c2c2c;margin-bottom:14px;padding-bottom:8px;border-top:1px solid #ddd;}

        /* Available Rides Table */
        .rides-table{background:white;border:1px solid #ddd;border-radius:4px;overflow:hidden;margin-bottom:28px;}
        .rides-table table{width:100%;border-collapse:collapse;font-size:13px;}
        .rides-table th{background:#f7f7f7;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:#555;border-bottom:1px solid #ddd;font-weight:600;}
        .rides-table td{padding:10px 14px;border-bottom:1px solid #eee;color:#333;vertical-align:middle;}
        .rides-table tr:last-child td{border-bottom:none;}
        .rides-table tr:hover td{background:#f9f9f9;}
        .empty-state{text-align:center;padding:30px;color:#999;font-size:13px;}

        .badge-active{background:#d4edda;color:#155724;font-size:11px;padding:3px 8px;border-radius:3px;}
        .btn-select{background:#0057b8;color:white;border:none;padding:4px 12px;font-size:11px;border-radius:3px;cursor:pointer;}
        .btn-select:hover{background:#004494;}

        /* Join Form */
        .form-card{background:white;border:1px solid #ddd;border-radius:4px;padding:28px;max-width:620px;}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
        .form-control{width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:3px;font-size:13px;color:#333;background:#fff;}
        .form-control:focus{outline:none;border-color:#0057b8;box-shadow:0 0 0 2px rgba(0,87,184,0.1);}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        .alert-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:3px;padding:10px 14px;font-size:13px;margin-bottom:16px;}
        .form-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #eee;}
        .btn-cancel{background:#f0f0f0;color:#555;border:none;padding:8px 20px;border-radius:3px;font-size:13px;cursor:pointer;text-decoration:none;}
        .btn-cancel:hover{background:#e0e0e0;color:#333;}
        .form-hint{font-size:11px;color:#999;margin-top:4px;}
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="page-content">

        <h1 class="page-title">Join a Ride</h1>

        <!-- Available Driver Rides -->
        <p class="section-title">Available Rides</p>
        <div class="rides-table">
            <table>
                <thead>
                <tr>
                    <th>Ride ID</th>
                    <th>Driver ID</th>
                    <th>Origin</th>
                    <th>Destination</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Seats</th>
                    <th>Price/Seat (LKR)</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(availableRides)}">
                    <td colspan="10" class="empty-state">No rides available at the moment.</td>
                </tr>
                <tr th:each="ride : ${availableRides}">
                    <td th:text="${ride[0]}">-</td>
                    <td th:text="${ride[2]}">-</td>
                    <td th:text="${ride[3]}">-</td>
                    <td th:text="${ride[4]}">-</td>
                    <td th:text="${ride[5]}">-</td>
                    <td th:text="${ride[6]}">-</td>
                    <td th:text="${ride[7]}">-</td>
                    <td th:text="${ride[10]}">-</td>
                    <td><span class="badge-active">Active</span></td>
                    <td>
                        <button class="btn-select"
                                th:onclick="|fillForm('${ride[0]}','${ride[3]}','${ride[4]}','${ride[5]}','${ride[6]}','${ride[10]}')|">
                            Select
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Join Form -->
        <p class="section-title">Your Details</p>
        <div class="form-card">

            <div class="alert-error" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/rides/join}" method="post">

                <div class="form-group">
                    <label>Your User ID</label>
                    <input type="text" name="userId" class="form-control" placeholder="e.g. USR-2" required />
                </div>

                <div class="form-group">
                    <label>Driver Ride ID</label>
                    <input type="text" id="driverRideId" name="driverRideId" class="form-control"
                           placeholder="Select a ride above or type manually" required />
                    <div class="form-hint">This links you to the driver's ride.</div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Origin</label>
                        <input type="text" id="origin" name="origin" class="form-control" placeholder="e.g. Colombo" required />
                    </div>
                    <div class="form-group">
                        <label>Destination</label>
                        <input type="text" id="destination" name="destination" class="form-control" placeholder="e.g. Kandy" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Ride Date</label>
                        <input type="date" id="rideDate" name="rideDate" class="form-control" required />
                    </div>
                    <div class="form-group">
                        <label>Ride Time</label>
                        <input type="time" id="rideTime" name="rideTime" class="form-control" required />
                    </div>
                </div>

                <div class="form-group">
                    <label>Fare Per Seat (LKR)</label>
                    <input type="number" id="farePerSeat" name="farePerSeat" class="form-control"
                           min="0" step="0.01" placeholder="e.g. 500.00" required />
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-main">Join Ride</button>
                    <a th:href="@{/rides}" class="btn-cancel">Cancel</a>
                </div>

            </form>
        </div>

    </div>
</div>

<script>
    function fillForm(rideId, destination, date, time, seats, fare) {
        document.getElementById('driverRideId').value = rideId;
        document.getElementById('destination').value = destination;
        document.getElementById('rideDate').value = date;
        document.getElementById('rideTime').value = time;
        document.getElementById('farePerSeat').value = fare;
        document.getElementById('driverRideId').scrollIntoView({behavior:'smooth', block:'center'});
    }
</script>
</body>
</html>
