<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Create Ride</title>
    <style>
        .form-card{background:white;border:1px solid #ddd;border-radius:4px;padding:28px;max-width:620px;}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
        .form-control{width:100%;padding:8px 12px;border:1px solid #ccc;border-radius:3px;font-size:13px;color:#333;background:#fff;}
        .form-control:focus{outline:none;border-color:#0057b8;box-shadow:0 0 0 2px rgba(0,87,184,0.1);}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
        .form-hint{font-size:11px;color:#999;margin-top:4px;}
        .alert-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;border-radius:3px;padding:10px 14px;font-size:13px;margin-bottom:16px;}
        .form-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #eee;}
        .btn-cancel{background:#f0f0f0;color:#555;border:none;padding:8px 20px;border-radius:3px;font-size:13px;cursor:pointer;text-decoration:none;}
        .btn-cancel:hover{background:#e0e0e0;color:#333;}
        .info-box{background:#e8f0fb;border:1px solid #b8d0f5;border-radius:3px;padding:12px 14px;font-size:12px;color:#004085;margin-bottom:20px;line-height:1.6;}
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="page-content">

        <h1 class="page-title">Create a Ride</h1>

        <div class="info-box">
            You are creating a <strong>Driver Ride</strong>. Set your route, date, time, available seats and price per seat.
            Passengers can then find and join your ride.
        </div>

        <div class="form-card">

            <!-- Error Message -->
            <div class="alert-error" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/rides/create}" method="post">

                <!-- User ID -->
                <div class="form-group">
                    <label>User ID</label>
                    <input type="text" name="userId" class="form-control" placeholder="e.g. USR-1" required />
                </div>

                <!-- Origin & Destination -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Origin</label>
                        <input type="text" name="origin" class="form-control" placeholder="e.g. Colombo" required />
                    </div>
                    <div class="form-group">
                        <label>Destination</label>
                        <input type="text" name="destination" class="form-control" placeholder="e.g. Kandy" required />
                    </div>
                </div>

                <!-- Date & Time -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Ride Date</label>
                        <input type="date" name="rideDate" class="form-control" th:min="${minDate}" required />
                    </div>
                    <div class="form-group">
                        <label>Ride Time</label>
                        <input type="time" name="rideTime" class="form-control" required />
                    </div>
                </div>

                <!-- Seats & Price -->
                <div class="form-row">
                    <div class="form-group">
                        <label>Available Seats</label>
                        <input type="number" name="availableSeats" class="form-control" min="1" max="10" placeholder="e.g. 3" required />
                        <div class="form-hint">Maximum 10 seats</div>
                    </div>
                    <div class="form-group">
                        <label>Price Per Seat (LKR)</label>
                        <input type="number" name="pricePerSeat" class="form-control" min="0" step="0.01" placeholder="e.g. 500.00" required />
                    </div>
                </div>

                <!-- Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn-main">Create Ride</button>
                    <a th:href="@{/rides}" class="btn-cancel">Cancel</a>
                </div>

            </form>
        </div>

    </div>
</div>
</body>
</html>
