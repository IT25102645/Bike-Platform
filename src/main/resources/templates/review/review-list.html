<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Reviews</title>
    <style>
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0;
            background: #fff; border-bottom: 1px solid #ddd; }
        .stat { text-align: center; padding: 20px 16px; border-right: 1px solid #eee; }
        .stat:last-child { border-right: none; }
        .stat-num { font-size: 26px; font-weight: bold; color: #0057b8; }
        .stat-lbl { font-size: 12px; color: #777; margin-top: 4px;
            text-transform: uppercase; letter-spacing: 0.5px; }

        .section { padding: 24px; }
        .section h2 { font-size: 15px; font-family: Georgia, serif; margin-bottom: 16px;
            color: #2c2c2c; padding-bottom: 8px; border-bottom: 1px solid #ddd; }

        .review-card { background: white; border: 1px solid #ddd; border-radius: 4px;
            padding: 16px; margin-bottom: 12px; border-left: 3px solid #0057b8; }
        .review-card.ride { border-left-color: #28a745; }

        .review-header { display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 8px; }
        .reviewer-name { font-size: 14px; font-weight: bold; color: #2c2c2c; }
        .reviewer-date { font-size: 12px; color: #999; }

        .badge-bike { background: #d4edda; color: #155724; font-size: 11px;
            padding: 3px 8px; border-radius: 3px; }
        .badge-ride { background: #d1ecf1; color: #0c5460; font-size: 11px;
            padding: 3px 8px; border-radius: 3px; }

        .stars { color: #f39c12; font-size: 1rem; margin-bottom: 6px; }
        .stars .empty { color: #ddd; }

        .review-comment { font-size: 13px; color: #444; line-height: 1.5; margin-bottom: 8px; }

        .review-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; color: #777; }
        .meta-item { background: #f4f4f4; padding: 2px 8px; border-radius: 3px;
            border: 1px solid #ddd; }

        .no-reviews { text-align: center; padding: 40px; color: #aaa; font-size: 13px; }

        .alert { padding: 10px 14px; border-radius: 3px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
<div layout:fragment="content">

    <!-- Stats -->
    <div class="stats">
        <div class="stat">
            <div class="stat-num" th:text="${#numbers.formatDecimal(averageRating, 1, 1)}">0.0</div>
            <div class="stat-lbl">Average Rating</div>
        </div>
        <div class="stat">
            <div class="stat-num" th:text="${reviews.size()}">0</div>
            <div class="stat-lbl">Total Reviews</div>
        </div>
    </div>

    <div class="section">
        <h2>Customer Reviews</h2>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(reviews)}" class="no-reviews">
            No reviews yet. Be the first to share your experience!
        </div>

        <!-- review[0]=id, [1]=type, [2]=userId, [3]=username, [4]=rating, [5]=comment, [6]=date -->
        <div th:each="review : ${reviews}">
            <div class="review-card" th:classappend="${review[1] == 'RIDE'} ? 'ride' : ''">

                <div class="review-header">
                    <div>
                        <span class="reviewer-name" th:text="${review[3]}">Name</span>
                        <span class="reviewer-date" th:text="' · ' + ${review[6]}"></span>
                    </div>
                    <span th:classappend="${review[1] == 'BIKE'} ? 'badge-bike' : 'badge-ride'"
                          th:text="${review[1]}">Type</span>
                </div>

                <!-- Star rating -->
                <div class="stars">
                    <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                        <span th:classappend="${i <= #numbers.formatInteger(review[4], 1)} ? '' : 'empty'">&#9733;</span>
                    </th:block>
                    <span style="font-size:12px; color:#999;" th:text="'(' + ${review[4]} + '/5)'"></span>
                </div>

                <div class="review-comment" th:text="${review[5]}">Comment</div>

                <!-- Meta info -->
                <div class="review-meta">
                    <span class="meta-item" th:text="'ID: ' + ${review[0]}"></span>
                    <span class="meta-item" th:if="${review[1] == 'BIKE' and review.length > 8}"
                          th:text="'Bike: ' + ${review[8]}"></span>
                    <span class="meta-item" th:if="${review[1] == 'BIKE' and review.length > 9}"
                          th:text="'Condition: ' + ${review[9]}"></span>
                    <span class="meta-item" th:if="${review[1] == 'RIDE' and review.length > 8}"
                          th:text="${review[8]} + ' km'"></span>
                    <span class="meta-item" th:if="${review[1] == 'RIDE' and review.length > 9}"
                          th:text="${review[9]} + ' min'"></span>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
