<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Submit Review</title>
    <style>
        .form-section { padding: 24px; max-width: 700px; }
        .form-section h2 { font-size: 15px; font-family: Georgia, serif; margin-bottom: 16px;
            color: #2c2c2c; padding-bottom: 8px; border-bottom: 1px solid #ddd; }

        .tab-bar { display: flex; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
        .tab-btn { padding: 8px 20px; background: none; border: none; cursor: pointer;
            font-size: 13px; border-bottom: 2px solid transparent; margin-bottom: -1px; color: #777; }
        .tab-btn.active { border-bottom-color: #0057b8; color: #0057b8; font-weight: bold; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold;
            margin-bottom: 5px; color: #333; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 7px 10px; border: 1px solid #ccc;
            border-radius: 3px; font-size: 13px; box-sizing: border-box; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #0057b8; }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .star-group { display: flex; flex-direction: row-reverse; width: fit-content; gap: 2px; }
        .star-group input[type="radio"] { display: none; }
        .star-group label { font-size: 1.6rem; color: #ccc; cursor: pointer; }
        .star-group input[type="radio"]:checked ~ label,
        .star-group label:hover,
        .star-group label:hover ~ label { color: #f39c12; }

        .checkbox-row { display: flex; align-items: center; gap: 8px; }
        .checkbox-row input { width: auto; }
        .checkbox-row label { font-weight: normal; font-size: 13px; margin: 0; }

        .alert { padding: 10px 14px; border-radius: 3px; margin-bottom: 16px; font-size: 13px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="form-section">
        <h2>Submit a Review</h2>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>

        <!-- Tab switcher -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('bike', this)">Bike Review</button>
            <button class="tab-btn"        onclick="switchTab('ride', this)">Ride Review</button>
        </div>

        <!-- Bike Review Form -->
        <div id="bikePanel" class="tab-panel active">
            <form th:action="@{/reviews/submit/bike}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label>User ID</label>
                        <input type="text" name="userId" placeholder="e.g. U001" required />
                    </div>
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" name="username" placeholder="Display name" required />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Bike ID</label>
                        <input type="text" name="bikeId" placeholder="e.g. B012" required />
                    </div>
                    <div class="form-group">
                        <label>Bike Name</label>
                        <input type="text" name="bikeName" placeholder="e.g. Mountain Pro X" required />
                    </div>
                </div>
                <div class="form-group">
                    <label>Rating</label>
                    <div class="star-group">
                        <input type="radio" id="bs5" name="rating" value="5" required /><label for="bs5">&#9733;</label>
                        <input type="radio" id="bs4" name="rating" value="4" /><label for="bs4">&#9733;</label>
                        <input type="radio" id="bs3" name="rating" value="3" /><label for="bs3">&#9733;</label>
                        <input type="radio" id="bs2" name="rating" value="2" /><label for="bs2">&#9733;</label>
                        <input type="radio" id="bs1" name="rating" value="1" /><label for="bs1">&#9733;</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Bike Condition</label>
                    <select name="bikeCondition" required>
                        <option value="">-- Select --</option>
                        <option value="Excellent">Excellent</option>
                        <option value="Good">Good</option>
                        <option value="Fair">Fair</option>
                        <option value="Poor">Poor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Comment</label>
                    <textarea name="comment" placeholder="Share your experience..." required></textarea>
                </div>
                <div class="form-group">
                    <div class="checkbox-row">
                        <input type="checkbox" name="wouldRecommend" value="true" id="recommend" />
                        <label for="recommend">I would recommend this bike</label>
                    </div>
                </div>
                <button type="submit" class="btn-main">Submit Bike Review</button>
            </form>
        </div>

        <!-- Ride Review Form -->
        <div id="ridePanel" class="tab-panel">
            <form th:action="@{/reviews/submit/ride}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label>User ID</label>
                        <input type="text" name="userId" placeholder="e.g. U001" required />
                    </div>
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" name="username" placeholder="Display name" required />
                    </div>
                </div>
                <div class="form-group">
                    <label>Ride ID</label>
                    <input type="text" name="rideId" placeholder="e.g. R045" required />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Distance (km)</label>
                        <input type="number" name="rideDistanceKm" step="0.1" min="0" placeholder="e.g. 12.5" required />
                    </div>
                    <div class="form-group">
                        <label>Duration (minutes)</label>
                        <input type="number" name="rideDurationMinutes" min="1" placeholder="e.g. 45" required />
                    </div>
                </div>
                <div class="form-group">
                    <label>Overall Rating</label>
                    <div class="star-group">
                        <input type="radio" id="rs5" name="rating" value="5" required /><label for="rs5">&#9733;</label>
                        <input type="radio" id="rs4" name="rating" value="4" /><label for="rs4">&#9733;</label>
                        <input type="radio" id="rs3" name="rating" value="3" /><label for="rs3">&#9733;</label>
                        <input type="radio" id="rs2" name="rating" value="2" /><label for="rs2">&#9733;</label>
                        <input type="radio" id="rs1" name="rating" value="1" /><label for="rs1">&#9733;</label>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Route Experience</label>
                        <select name="routeExperience" required>
                            <option value="">-- Select --</option>
                            <option value="Scenic">Scenic</option>
                            <option value="Smooth">Smooth</option>
                            <option value="Rough">Rough</option>
                            <option value="Challenging">Challenging</option>
                            <option value="Urban">Urban</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Safety Rating</label>
                        <div class="star-group">
                            <input type="radio" id="sf5" name="safetyRating" value="5" required /><label for="sf5">&#9733;</label>
                            <input type="radio" id="sf4" name="safetyRating" value="4" /><label for="sf4">&#9733;</label>
                            <input type="radio" id="sf3" name="safetyRating" value="3" /><label for="sf3">&#9733;</label>
                            <input type="radio" id="sf2" name="safetyRating" value="2" /><label for="sf2">&#9733;</label>
                            <input type="radio" id="sf1" name="safetyRating" value="1" /><label for="sf1">&#9733;</label>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Comment</label>
                    <textarea name="comment" placeholder="Describe your ride..." required></textarea>
                </div>
                <button type="submit" class="btn-main">Submit Ride Review</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(type + 'Panel').classList.add('active');
        }
    </script>
</div>
</body>
</html>
