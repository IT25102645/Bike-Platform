<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Login</title>
    <style>
        .auth-card{max-width:400px;margin:50px auto;background:white;border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,0.1);overflow:hidden;}
        .auth-header{background:#1a1a2e;color:white;padding:30px;text-align:center;}
        .auth-header h1{font-size:22px;margin-bottom:8px;font-family:Georgia,serif;}
        .auth-header p{font-size:13px;color:#aaa;}
        .auth-body{padding:30px;}
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;font-size:12px;font-weight:bold;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
        .form-control{width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;font-size:14px;transition:all 0.3s;}
        .form-control:focus{border-color:#0057b8;outline:none;box-shadow:0 0 0 3px rgba(0,87,184,0.1);}
        .btn-submit{width:100%;padding:14px;background:#0057b8;color:white;border:none;border-radius:4px;font-size:14px;font-weight:bold;cursor:pointer;transition:background 0.3s;}
        .btn-submit:hover{background:#004494;}
        .auth-footer{text-align:center;padding:20px;font-size:13px;color:#777;border-top:1px solid #eee;}
        .auth-footer a{color:#0057b8;text-decoration:none;font-weight:bold;}
        .alert{padding:12px;border-radius:4px;margin-bottom:20px;font-size:13px;}
        .alert-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;}
        .alert-success{background:#d4edda;color:#155724;border:1px solid #c3e6cb;}
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Please login to your account</p>
        </div>
        <div class="auth-body">
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/users/login}" method="POST">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
        </div>
        <div class="auth-footer">
            Don't have an account? <a th:href="@{/users/register}">Register here</a>
        </div>
    </div>
</div>
</body>
</html>
