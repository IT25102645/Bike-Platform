<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory - Bike Platform</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .user-table {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .role-indicator {
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            display: inline-block;
        }

        .role-rider { background-color: #e3f2fd; color: #1976d2; }
        .role-owner { background-color: #f3e5f5; color: #7b1fa2; }
        .role-user { background-color: #f5f5f5; color: #616161; }

        .action-btns {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            transition: all 0.2s;
            text-decoration: none;
        }

        .action-btn:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .btn-delete:hover {
            background-color: var(--danger-color);
            border-color: var(--danger-color);
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="/">Bike Rental Platform</a>
    <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link active" href="/users/list">Users</a>
        <a class="nav-link" href="/users/register"><i class="fas fa-plus-circle"></i> Add User</a>
    </div>
</nav>

<main class="container">
    <div class="list-header">
        <h1>User Directory</h1>
        <a href="/users/register" class="btn btn-primary"><i class="fas fa-user-plus"></i> New User</a>
    </div>

    <div class="user-table">
        <table class="table-container">
            <thead>
                <tr>
                    <th>NAME</th>
                    <th>EMAIL</th>
                    <th>ROLE</th>
                    <th>PHONE</th>
                    <th style="text-align: right;">ACTIONS</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div style="width: 32px; height: 32px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem;" th:text="${#strings.substring(user.name, 0, 1).toUpperCase()}">U</div>
                            <span th:text="${user.name}" style="font-weight: 600;">John Silva</span>
                        </div>
                    </td>
                    <td th:text="${user.email}">john@example.com</td>
                    <td>
                        <span class="role-indicator" 
                              th:classappend="${user.role == 'RIDER' ? 'role-rider' : (user.role == 'OWNER' ? 'role-owner' : 'role-user')}"
                              th:text="${user.role}">RIDER</span>
                    </td>
                    <td th:text="${user.phone}">071XXXXXXX</td>
                    <td style="text-align: right;">
                        <div class="action-btns" style="justify-content: flex-end;">
                            <a th:href="@{'/users/profile/' + ${user.userId}}" class="action-btn" title="View Profile"><i class="fas fa-eye"></i></a>
                            <a th:href="@{'/users/edit/' + ${user.userId}}" class="action-btn" title="Edit"><i class="fas fa-pen"></i></a>
                            <form th:action="@{'/users/delete/' + ${user.userId}}" method="POST" onsubmit="return confirm('Delete this user?')">
                                <button type="submit" class="action-btn btn-delete" title="Delete"><i class="fas fa-trash-alt"></i></button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer>
    <p>&copy; 2026 Bike Rental Platform. All rights reserved.</p>
</footer>

</body>
</html>
