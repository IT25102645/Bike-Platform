<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Error – Bike Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        body { font-family:'Segoe UI', sans-serif; background:#0f0f23; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; text-align:center; }
        .card { background:#16213e; padding:3rem; border-radius:16px; border:1px solid rgba(255,255,255,0.1); max-width:500px; width:90%; }
        i { font-size:4rem; color:#e94560; margin-bottom:1.5rem; }
        h1 { font-size:2rem; margin-bottom:1rem; }
        p { color:rgba(255,255,255,0.6); margin-bottom:2rem; line-height:1.6; }
        .btn { display:inline-block; padding:12px 24px; background:#e94560; color:#fff; text-decoration:none; border-radius:8px; font-weight:600; transition:0.2s; }
        .btn:hover { background:#c73652; transform:translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <i class="fas fa-exclamation-circle"></i>
        <h1>Oops! Something went wrong</h1>
        <p th:text="${error}">An unexpected error occurred. Please try again later.</p>
        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
