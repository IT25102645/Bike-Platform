<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Bike Platform</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .register-container {
            max-width: 650px;
            margin: 4rem auto;
        }

        .card-header {
            background-color: var(--dark-bg);
            color: white;
            padding: 2rem;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        .card-header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .card-header p {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .section-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .dynamic-fields {
            margin-top: 1.5rem;
            background-color: #fcfcfc;
            padding: 1rem;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            display: none;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" href="/">Bike Rental Platform</a>
    <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/users/login">Login</a>
    </div>
</nav>

<div class="register-container">
    <div class="card" style="padding: 0; border: none;">
        <div class="card-header">
            <h1>Create Account</h1>
            <p>Register as a Rider or Bike Owner to get started.</p>
        </div>
        
        <form th:action="@{/users/register}" method="POST" style="padding: 2rem;">
            <div class="section-label">Basic Information</div>
            
            <div class="form-group">
                <label for="name">FULL NAME</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="John Silva" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">PHONE NUMBER</label>
                    <input type="text" id="phone" name="phone" class="form-control" placeholder="07X XXX XXXX" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
            </div>

            <div class="section-label">Account Type</div>

            <div class="form-group">
                <label for="role">REGISTER AS</label>
                <select id="role" name="role" class="form-control" required onchange="toggleFields()">
                    <option value="" disabled selected>-- Select Role --</option>
                    <option value="RIDER">Rider (Book Rides/Bikes)</option>
                    <option value="OWNER">Bike Owner (List your Bikes)</option>
                    <option value="USER">General User</option>
                </select>
            </div>

            <!-- Rider Specific Fields -->
            <div id="riderFields" class="dynamic-fields">
                <div class="form-group">
                    <label for="licenseNumber">LICENSE NUMBER</label>
                    <input type="text" id="licenseNumber" name="licenseNumber" class="form-control" placeholder="DL12345678">
                </div>
            </div>

            <!-- Owner Specific Fields -->
            <div id="ownerFields" class="dynamic-fields">
                <div class="form-row">
                    <div class="form-group">
                        <label for="bankAccount">BANK ACCOUNT NO.</label>
                        <input type="text" id="bankAccount" name="bankAccount" class="form-control" placeholder="1234567890">
                    </div>
                    <div class="form-group">
                        <label for="businessName">BUSINESS NAME</label>
                        <input type="text" id="businessName" name="businessName" class="form-control" placeholder="Nimal's Bike Rentals">
                    </div>
                </div>
            </div>

            <div style="margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Create My Account</button>
            </div>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Already have an account? <a href="/users/login" style="color: var(--primary-color); font-weight: 600;">Login here</a>
            </div>
        </form>
    </div>
</div>

<footer>
    <p>&copy; 2026 Bike Rental Platform. All rights reserved.</p>
</footer>

<script>
    function toggleFields() {
        const role = document.getElementById('role').value;
        const riderFields = document.getElementById('riderFields');
        const ownerFields = document.getElementById('ownerFields');

        riderFields.style.display = (role === 'RIDER') ? 'block' : 'none';
        ownerFields.style.display = (role === 'OWNER') ? 'block' : 'none';
    }
</script>

</body>
</html>
