<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Register</title>
    <style>
        .auth-card{max-width:600px;margin:50px auto;background:white;border-radius:8px;box-shadow:0 10px 30px rgba(0,0,0,0.1);overflow:hidden;}
        .auth-header{background:#1a1a2e;color:white;padding:30px;text-align:center;}
        .auth-header h1{font-size:22px;margin-bottom:8px;font-family:Georgia,serif;}
        .auth-header p{font-size:13px;color:#aaa;}
        .auth-body{padding:30px;}
        .section-title{font-size:11px;font-weight:bold;color:#999;text-transform:uppercase;letter-spacing:1.5px;margin:25px 0 15px;display:flex;align-items:center;gap:10px;}
        .section-title::after{content:"";flex:1;height:1px;background:#eee;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
        .form-group{margin-bottom:20px;}
        .form-group label{display:block;font-size:12px;font-weight:bold;color:#555;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
        .form-control{width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;font-size:14px;}
        .btn-submit{width:100%;padding:14px;background:#0057b8;color:white;border:none;border-radius:4px;font-size:14px;font-weight:bold;cursor:pointer;}
        .auth-footer{text-align:center;padding:20px;font-size:13px;color:#777;border-top:1px solid #eee;}
        .auth-footer a{color:#0057b8;text-decoration:none;font-weight:bold;}
    </style>
</head>
<body>
<div layout:fragment="content">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join the Bike Rental Platform today</p>
        </div>
        <div class="auth-body">
            <form th:action="@{/users/register}" method="POST">
                <div class="section-title">Basic Information</div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Silva" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" name="phone" class="form-control" placeholder="07XXXXXXXX" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
                </div>

                <div class="section-title">Account Type</div>
                <div class="form-group">
                    <label>Register As</label>
                    <select name="role" class="form-control" id="roleSelect" onchange="toggleFields()">
                        <option value="RIDER">Rider (I want to rent bikes/rides)</option>
                        <option value="OWNER">Bike Owner (I want to list my bikes)</option>
                        <option value="USER">General User</option>
                    </select>
                </div>

                <div id="riderFields">
                    <div class="form-group">
                        <label>Driving License Number</label>
                        <input type="text" name="licenseNumber" class="form-control" placeholder="L1234567">
                    </div>
                </div>

                <div id="ownerFields" style="display:none;">
                    <div class="form-group">
                        <label>Bank Account Number</label>
                        <input type="text" name="bankAccount" class="form-control" placeholder="1234567890">
                    </div>
                </div>

                <button type="submit" class="btn-submit" style="margin-top:20px;">Create My Account</button>
            </form>
        </div>
        <div class="auth-footer">
            Already have an account? <a th:href="@{/users/login}">Login here</a>
        </div>
    </div>

    <script>
        function toggleFields() {
            const role = document.getElementById('roleSelect').value;
            document.getElementById('riderFields').style.display = (role === 'RIDER') ? 'block' : 'none';
            document.getElementById('ownerFields').style.display = (role === 'OWNER') ? 'block' : 'none';
        }
    </script>
</div>
</body>
</html>
