<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Rent a Bike</title></head>
<body>
<div layout:fragment="content">
    <div class="page-content">
        <h2 class="page-title">🚲 Rent a Bike</h2>
        <div style="background: white; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 2rem;">
            <form action="/rentals/rent" method="post">
                <div class="row">
                    <div class="col mb-3">
                        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 4px;">User ID</label>
                        <input type="text" name="userId" class="form-control" required style="border-radius: 8px;">
                    </div>
                    <div class="col mb-3">
                        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 4px;">Bike ID</label>
                        <input type="text" name="bikeId" class="form-control" required style="border-radius: 8px;">
                    </div>
                </div>
                <div class="row">
                    <div class="col mb-3">
                        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 4px;">Start Date</label>
                        <input type="date" name="startDate" class="form-control" required style="border-radius: 8px;">
                    </div>
                    <div class="col mb-3">
                        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 4px;">End Date</label>
                        <input type="date" name="endDate" class="form-control" required style="border-radius: 8px;">
                    </div>
                </div>
                <div class="row">
                    <div class="col mb-3">
                        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 4px;">Number of Hours</label>
                        <input type="number" name="hours" class="form-control" required style="border-radius: 8px;">
                    </div>
                    <div class="col mb-3">
                        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 4px;">Rate Per Hour (LKR)</label>
                        <input type="number" step="0.01" name="ratePerHour" class="form-control" required style="border-radius: 8px;">
                    </div>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 1rem;">
                    <button type="submit" class="btn-main">Rent Now</button>
                    <a href="/rentals" style="background: transparent; color: #1a1a2e; border: 1px solid #1a1a2e; padding: 8px 20px; border-radius: 8px; text-decoration: none;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
